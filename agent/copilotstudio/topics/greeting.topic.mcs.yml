mcs.metadata:
  componentName: Greeting
  description: Triggered when the user opens a conversation. Sets expectations.
kind: AdaptiveDialog
beginDialog:
  kind: OnConversationStart
  id: main
  actions:
    - kind: SendActivity
      id: sendMessage_grt001
      activity: |-
        Hi! I'm the Fabric Workspace Provisioner.

        I can help you:
        - Request a new Microsoft Fabric workspace (governed via pull request)
        - Look up what regions, capacities, domains and sub-domains are approved
        - Explain the workspace approval workflow

        What would you like to do?